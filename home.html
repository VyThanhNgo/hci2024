<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Management System - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(to right, #E0F2F1, #B2DFDB);
            margin: 0;
            padding: 0;
            color: #212121;
            overflow-x: hidden; /* Prevent horizontal overflow */
        }

        header {
            background-color: #00796B;
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            margin: 0 15px;
            color: white;
            text-decoration: none;
            font-size: 18px;
            position: relative;
            transition: color 0.3s, transform 0.3s;
        }

        nav a:hover {
            color: #FFD54F;
            transform: scale(1.1);
        }

        nav a i {
            margin-right: 8px;
        }

        .content {
            padding: 40px;
            text-align: center;
            max-width: 800px;
            margin: 20px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
            animation: fadeIn 0.5s; /* Animation for content */
        }

        .content:hover {
            transform: scale(1.02);
        }

        .content h2 {
            color: #004D40;
            margin-bottom: 20px;
            font-size: 30px;
            transition: color 0.3s;
        }

        .content h2:hover {
            color: #00796B;
        }

        .content p {
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
            opacity: 0.9; /* Slightly transparent text */
            transition: opacity 0.3s; /* Transition for text opacity */
        }

        .content:hover p {
            opacity: 1; /* Full opacity on hover */
        }

        .overview-image {
            width: 100%;
            max-width: 600px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin-top: 20px;
            transition: transform 0.3s;
        }

        .overview-image:hover {
            transform: scale(1.05);
        }

        .icon-container {
            display: flex;
            justify-content: center;
            margin-top: 30px; /* Space above icons */
            gap: 20px; /* Space between icons */
        }

        .icon {
            background: #B2DFDB;
            border-radius: 50%;
            padding: 20px;
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, background-color 0.3s; /* Add transition effects */
        }

        .icon:hover {
            transform: translateY(-5px); /* Lift effect on hover */
            background-color: #FFD54F; /* Change background color on hover */
        }

        footer {
            background-color: #004D40;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
            box-shadow: 0 -1px 5px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s;
        }

        footer:hover {
            background-color: #00796B;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            nav a {
                display: block;
                margin: 10px 0;
            }

            .content {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1><i class="fas fa-home"></i> Course Management System</h1>
        <nav>
            <a href="home.html"><i class="fas fa-tachometer-alt"></i> Home</a>
            <a href="about.html"><i class="fas fa-info-circle"></i> About</a>
            <a href="tabs.html"><i class="fas fa-list-alt"></i> Tabs</a>
        </nav>
    </header>

    <div class="content">
        <h2>Overview</h2>
        <p>Manage courses and track exercises in C, Python, and Java. Easily navigate through the system with clear functionality and intuitive design.</p>
        <img src="https://miro.medium.com/v2/resize:fit:720/format:webp/0*-vBaGtfS12kSByM1.jpg" alt="Overview" class="overview-image">

        <!-- New Icon Section -->
        <div class="icon-container">
            <div class="icon"><i class="fas fa-code"></i></div>
            <div class="icon"><i class="fas fa-book"></i></div>
            <div class="icon"><i class="fas fa-users"></i></div>
            <div class="icon"><i class="fas fa-check-circle"></i></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Course Management System. All rights reserved.</p>
    </footer>
</body>

</html>
